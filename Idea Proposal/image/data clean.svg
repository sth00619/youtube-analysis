<svg viewBox="0 0 800 750" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="750" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Data Cleaning Process
  </text>
  
  <!-- Raw Data Box -->
  <g transform="translate(250, 80)">
    <rect width="300" height="100" rx="10" fill="#dc3545" opacity="0.9"/>
    <text x="150" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      Raw Data
    </text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="white">
      Missing values, incorrect types
    </text>
    <text x="150" y="80" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="white">
      Duplicates, unformatted text
    </text>
  </g>
  
  <!-- Data Cleaner Main Box -->
  <g transform="translate(150, 230)">
    <rect width="500" height="350" rx="15" fill="#ffffff" stroke="#007bff" stroke-width="3"/>
    
    <!-- Header -->
    <rect width="500" height="60" rx="15" fill="#007bff"/>
    <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">
      Data Cleaner
    </text>
    <text x="250" y="55" font-family="monospace" font-size="14" text-anchor="middle" fill="white">
      cleaners/data_cleaner.py
    </text>
    
    <!-- Technical Items -->
    <g transform="translate(30, 75)">
      <!-- Missing Values -->
      <g transform="translate(0, 0)">
        <circle cx="20" cy="20" r="15" fill="#28a745"/>
        <text x="20" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">1</text>
        <text x="50" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Missing Values</text>
        <text x="50" y="40" font-family="Arial, sans-serif" font-size="13" fill="#666">Fill/Drop NA values</text>
      </g>
      
      <!-- Data Type Conversion -->
      <g transform="translate(0, 55)">
        <circle cx="20" cy="20" r="15" fill="#ffc107"/>
        <text x="20" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">2</text>
        <text x="50" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Data Type Conversion</text>
        <text x="50" y="40" font-family="Arial, sans-serif" font-size="13" fill="#666">Type Casting (str → int/float)</text>
      </g>
      
      <!-- Date Parsing -->
      <g transform="translate(0, 110)">
        <circle cx="20" cy="20" r="15" fill="#17a2b8"/>
        <text x="20" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">3</text>
        <text x="50" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Date Parsing</text>
        <text x="50" y="40" font-family="Arial, sans-serif" font-size="13" fill="#666">Datetime Parsing</text>
      </g>
      
      <!-- Duplicate Removal -->
      <g transform="translate(0, 165)">
        <circle cx="20" cy="20" r="15" fill="#6f42c1"/>
        <text x="20" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">4</text>
        <text x="50" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Duplicate Removal</text>
        <text x="50" y="40" font-family="Arial, sans-serif" font-size="13" fill="#666">Drop Duplicates</text>
      </g>
      
      <!-- Text Cleaning -->
      <g transform="translate(0, 220)">
        <circle cx="20" cy="20" r="15" fill="#e83e8c"/>
        <text x="20" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">5</text>
        <text x="50" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Text Cleaning</text>
        <text x="50" y="40" font-family="Arial, sans-serif" font-size="13" fill="#666">Special characters, whitespace removal</text>
      </g>
    </g>
  </g>
  
  <!-- Cleaned Data Box -->
  <g transform="translate(250, 620)">
    <rect width="300" height="100" rx="10" fill="#28a745" opacity="0.9"/>
    <text x="150" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      Cleaned Data
    </text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="white">
      Ready for analysis
    </text>
    <text x="150" y="80" font-family="monospace" font-size="13" text-anchor="middle" fill="white">
      /data/processed/
    </text>
  </g>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="15" markerHeight="15" refX="14" refY="5" orient="auto">
      <polygon points="0 0, 15 5, 0 10" fill="#5f6368"/>
    </marker>
  </defs>
  
  <!-- Raw to Cleaner -->
  <path d="M 400 180 L 400 230" stroke="#5f6368" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Cleaner to Cleaned -->
  <path d="M 400 580 L 400 620" stroke="#5f6368" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Tools Badge -->
  <g transform="translate(460, 280)">
    <rect width="160" height="35" rx="17" fill="#f8f9fa" stroke="#6c757d" stroke-width="2"/>
    <text x="80" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#495057">
      Python | Pandas
    </text>
  </g>
</svg>